<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline, Internal and External CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        pre{
            color: red;
        }
    </style>
</head>
<body>

    <!-- Inline method -->
    <p style="color: blue;">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Rerum, illo?
    </p>
    
    <!-- Internal CSS -->
     <pre>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Dolores, quibusdam!</pre>

     <!-- External CSS -->
      <h1>This is a heading</h1>

      <pre>Types of selectors in CSS:
        Element Selectors
        Class Selectors
        ID Selectors
        Group Selecters


      </pre>
</body>
</html>
