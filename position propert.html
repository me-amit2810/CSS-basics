<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position property</title>
    <style>
        .container{
            background-color: burlywood;
            border: 5px solid red;
            height: 1000px;
        }
        .box{
            font-size: 25px;
            height: 200px;
            width: 200px;
            border: 2px solid black;
            display: inline-block;
        }
        #box1{
            /* position: relative; */
            /* position: absolute;
            top: 250px;
            left: 250px; */
            position: fixed;
            top: 50%;
            left: 50%;
        }
        #box4{
            border: none;
            position: fixed;
            right: 10px;
            bottom: 10px;
            height: 100px;
            width: 100px;
        }
        #box4 img{
            height: 100px;
            border-radius: 250px;
        }
        #box3{
            top: 10px;
            position: sticky;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <!-- div.box#box1*4 -->
        <div class="box" id="box1">This is box1</div>
        <div class="box" id="box2">This is box2</div>
        <div class="box" id="box3">This is box3</div>
        <div class="box" id="box4"><img src="Chatbot Flat Vector.jpg" alt=""></div>
    </div>

</body>
</html>
